# Minimal Emacs-first MangoWC config.

# Effects and animations
animations=0
layer_animations=0
blur=0
blur_layer=0
shadows=0
layer_shadows=0
border_radius=0
no_radius_when_single=1
focused_opacity=1.0
unfocused_opacity=1.0

# Behavior
sloppyfocus=0
warpcursor=0
focus_cross_monitor=0
focus_cross_tag=0
new_is_master=1
default_mfact=0.60
default_nmaster=1
smartgaps=1
no_border_when_single=1

# Appearance
gappih=4
gappiv=4
gappoh=4
gappov=4
borderpx=2
rootcolor=0x111111ff
bordercolor=0x3b3b3bff
focuscolor=0x88c0d0ff
maximizescreencolor=0x88c0d0ff
urgentcolor=0xbf616aff
scratchpadcolor=0x5e81acff
globalcolor=0x8fbcbbff
overlaycolor=0xa3be8cff

# Monitors
monitorrule=name:DP-2,width:3440,height:1440,refresh:175,x:0,y:0
monitorrule=name:HDMI-A-1,width:2560,height:1440,refresh:60,x:3440,y:0

# Keyboard
repeat_rate=30
repeat_delay=300
xkb_rules_layout=us

# Mouse
accel_profile=1

# Environment
env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland
env=NIXOS_OZONE_WL,1
env=MOZ_ENABLE_WAYLAND,1

# Startup
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE NIXOS_OZONE_WL
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE NIXOS_OZONE_WL
exec-once=mmsg -d focusmon,DP-2
exec-once=mako
exec=pkill waybar >/dev/null 2>&1 || true; waybar >/tmp/waybar.log 2>&1 &
exec-once=waybar
exec-once=wl-paste --watch cliphist store
exec-once=emacs --daemon
exec-once=swayidle -w timeout 600 "swaylock -f" timeout 900 "swaylock -f" before-sleep "swaylock -f"

# Tags:
# 1 = Emacs/dev, 2 = terminal/build, 3 = browser/docs, 4 = misc/comms.
tagrule=id:1,layout_name:tile,mfact:0.66,nmaster:1
tagrule=id:2,layout_name:tile,mfact:0.55,nmaster:1
tagrule=id:3,layout_name:monocle,nmaster:1
tagrule=id:4,layout_name:tile,mfact:0.50,nmaster:1

# App routing
windowrule=appid:emacs,tags:1
windowrule=appid:foot,tags:2
windowrule=appid:brave-browser,tags:3
windowrule=appid:vesktop,tags:4

# Core launchers
bind=SUPER,Return,spawn,foot
bind=SUPER,space,spawn,fuzzel
bind=SUPER,e,spawn,emacsclient -c -a emacs
bind=SUPER,b,spawn,brave

# Session controls
bind=SUPER,q,killclient
bind=SUPER+SHIFT,q,quit
bind=SUPER+SHIFT,r,reload_config
bind=SUPER+CTRL,l,spawn,swaylock -f

# Focus and move
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,comma,focusmon,left
bind=SUPER,period,focusmon,right
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right
bind=SUPER+SHIFT,comma,tagmon,left,1
bind=SUPER+SHIFT,period,tagmon,right,1

# Layouts and states
bind=SUPER,t,setlayout,tile
bind=SUPER,m,setlayout,monocle
bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,f,togglefloating

# Tag movement
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0
bind=SUPER+CTRL,Left,tagtoleft,0
bind=SUPER+CTRL,Right,tagtoright,0
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0

# Utilities
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=SUPER+SHIFT,s,spawn_shell,grim -g "$(slurp)" - | wl-copy
bind=SUPER,v,spawn_shell,cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
